stages:
  preprocess:
    cmd: python scripts/preprocess.py
    deps:
      - data/raw
      - scripts/preprocess.py
      - src/myproject/data
    outs:
      - data/processed

  train:
    cmd: python scripts/train.py
    deps:
      - data/processed
      - scripts/train.py
      - configs/
      - src/myproject/models
    params:
      - configs/train.yaml:
          - training
          - model
    metrics:
      - results/metrics/train_metrics.json:
          cache: false
    plots:
      - results/figures/loss_curve.csv
